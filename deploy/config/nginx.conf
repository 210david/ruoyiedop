# ============================================================
# 企业数字化运营平台 - Nginx配置
# 部署路径: D:\EDOP\nginx\conf\nginx.conf
# ============================================================

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 字符编码
    charset utf-8;

    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # 文件上传大小限制
    client_max_body_size  20m;

    # ========== Gzip 压缩 ==========
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # ========== 后端服务上游 ==========
    upstream edop_backend {
        server 127.0.0.1:8004;
        # 如有多台后端服务器可在此添加，实现负载均衡
        # server 127.0.0.1:8082 weight=1;
    }

    # ========== HTTP 服务 ==========
    server {
        listen       8005;
        server_name  localhost;

        # 访问日志
        access_log  logs/access.log  main;

        # ---------- 前端静态资源 ----------
        location / {
            root   D:/EDOP/frontend/dist;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ---------- 后端API代理 ----------
        location /prod-api/ {
            proxy_pass http://edop_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;
        }

        # ---------- Druid 监控台 ----------
        location /druid/ {
            proxy_pass http://edop_backend/druid/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---------- Swagger 接口文档 ----------
        location /swagger-ui.html {
            proxy_pass http://edop_backend/swagger-ui.html;
            proxy_set_header Host $host;
        }
        location /v3/api-docs {
            proxy_pass http://edop_backend/v3/api-docs;
            proxy_set_header Host $host;
        }
        location /webjars/ {
            proxy_pass http://edop_backend/webjars/;
            proxy_set_header Host $host;
        }

        # ---------- 文件上传访问路径 ----------
        location /profile/ {
            alias D:/EDOP/uploadPath/;
            # 防止直接访问脚本文件
            location ~*\.(js|jsp|sh|bat|exe|dll)$ {
                deny all;
            }
        }

        # ---------- 错误页面 ----------
        error_page  404 /index.html;
        error_page  500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }

    # ========== HTTPS 配置（可选，需准备SSL证书） ==========
    # server {
    #     listen       443 ssl;
    #     server_name  your_domain.com;
    #
    #     ssl_certificate      D:/EDOP/nginx/ssl/your_domain.crt;
    #     ssl_certificate_key  D:/EDOP/nginx/ssl/your_domain.key;
    #     ssl_session_cache    shared:SSL:1m;
    #     ssl_session_timeout  5m;
    #     ssl_ciphers  HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers  on;
    #
    #     # 其余配置与HTTP相同
    #     location / {
    #         root   D:/EDOP/frontend/dist;
    #         index  index.html;
    #         try_files $uri $uri/ /index.html;
    #     }
    #
    #     location /prod-api/ {
    #         proxy_pass http://edop_backend/;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     location /profile/ {
    #         alias D:/EDOP/uploadPath/;
    #     }
    # }
}
