# ============================================================
# 企业数字化运营平台 - 数据源配置
# 部署路径: D:\EDOP\app\application-druid.yml
# 说明: 请根据实际数据库环境修改连接信息
# ============================================================

spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # ========== 主库数据源 ==========
            # 请修改为实际的数据库地址、端口、库名、用户名、密码
            master:
                url: jdbc:mysql://localhost:3306/ry-vue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
                username: root
                password: 123456
            # 从库数据源（默认关闭）
            slave:
                enabled: false
                url:
                username:
                password:
            # 连接池配置
            initialSize: 3
            minIdle: 3
            maxActive: 10
            maxWait: 30000
            connectTimeout: 30000
            socketTimeout: 60000
            timeBetweenEvictionRunsMillis: 60000
            minEvictableIdleTimeMillis: 300000
            maxEvictableIdleTimeMillis: 900000
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter:
                enabled: true
            statViewServlet:
                enabled: true
                allow:
                url-pattern: /druid/*
                # Druid监控台账号密码（生产环境请修改）
                login-username: ruoyi
                login-password: 123456
            filter:
                stat:
                    enabled: true
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true
            connection-properties: config.decrypt=false
