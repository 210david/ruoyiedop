# ============================================================
# Redis 配置文件 (Windows)
# 部署路径: D:\EDOP\redis\redis.windows.conf
# ============================================================

# 绑定地址（默认仅本机访问，如需远程访问改为 0.0.0.0 或指定IP）
bind 127.0.0.1

# 端口
port 6379

# 数据库数量
databases 16

# 密码（生产环境强烈建议设置）
# requirepass your_redis_password

# 最大内存限制（根据服务器内存调整）
maxmemory 256mb

# 内存淘汰策略
maxmemory-policy allkeys-lru

# 持久化 - RDB
save 900 1
save 300 10
save 60 10000

# RDB文件名
dbfilename dump.rdb

# 数据目录
dir D:/EDOP/redis/data

# 日志级别
loglevel notice

# 日志文件
logfile "D:/EDOP/redis/logs/redis.log"

# 超时时间（秒），0表示不超时
timeout 300

# TCP keepalive
tcp-keepalive 60

# 是否以守护进程方式运行（Windows不支持daemonize，使用服务方式运行）
# daemonize yes
